<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: 'Open Sans', sans-serif;
      margin: 0;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eaeaea;
    }

    .header img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #1a1b1e;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #228be6;
    }

    input:checked + .slider:before {
      transform: translateX(16px);
    }

    .shortcut-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eaeaea;
    }

    .shortcut-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .shortcut-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .shortcut-display {
      background: #f1f3f5;
      padding: 4px 8px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }

    .edit-shortcut {
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .edit-shortcut:hover {
      opacity: 1;
    }

    .edit-shortcut svg {
      width: 14px;
      height: 14px;
      fill: #666;
    }

    .blacklist-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eaeaea;
    }

    .blacklist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .blacklist-title {
      font-size: 14px;
      font-weight: 600;
    }

    .blacklist-add {
      background: none;
      border: none;
      color: #228be6;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .blacklist-add:hover {
      background: rgba(34, 139, 230, 0.1);
    }

    .blacklist-items {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .blacklist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: #f1f3f5;
      border-radius: 4px;
      font-size: 13px;
    }

    .blacklist-remove {
      background: none;
      border: none;
      color: #e03131;
      cursor: pointer;
      padding: 2px;
      opacity: 0.6;
    }

    .blacklist-remove:hover {
      opacity: 1;
    }

    .blacklist-empty {
      font-size: 13px;
      color: #868e96;
      font-style: italic;
      padding: 4px 8px;
    }

    .api-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eaeaea;
    }

    .api-controls { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }

    .api-input-wrap { position: relative; flex: 1; min-width: 0; }

    .api-input { width: 100%; padding: 6px 36px 6px 8px; border-radius: 6px; border: 1px solid #ced4da; font-size: 13px; box-sizing: border-box; }

    .api-eye { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; border: none; background: none; padding: 0; cursor: pointer; opacity: .7; z-index: 1; }
    .api-eye:hover { opacity: 1; }

    .btn {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #ced4da;
      background: #f8f9fa;
      cursor: pointer;
      font-size: 13px;
    }

    .btn.primary {
      background: #228be6;
      border-color: #228be6;
      color: #fff;
    }

    .api-help {
      font-size: 11px;
      color: #868e96;
    }

    /* Toast */
    .toast { position: fixed; left: 12px; right: 12px; bottom: 12px; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: #fff; background: #2b8a3e; opacity: 0; transform: translateY(8px); transition: opacity .2s ease, transform .2s ease; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.error { background: #c92a2a; }
    @media (prefers-color-scheme: dark) {
      .toast { background: #2b8a3e; }
      .toast.error { background: #c92a2a; }
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #1a1b1e;
        color: #fff;
      }
      .header {
        border-bottom-color: #2c2e33;
      }
      .header h1 {
        color: #fff;
      }
      .shortcut-row {
        border-top-color: #2c2e33;
      }
      .shortcut-display {
        background: #2c2e33;
      }
      .blacklist-item {
        background: #2c2e33;
      }
      .blacklist-add {
        color: #74c0fc;
      }
      .blacklist-add:hover {
        background: rgba(116, 192, 252, 0.1);
      }
      .blacklist-empty {
        color: #868e96;
      }
      .edit-shortcut svg {
        fill: #fff;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="logo.png" alt="NanoGPT Logo">
    <h1>Browser Assistant</h1>
  </div>
  <div class="settings-container">
    <div class="toggle-container">
      <label class="switch">
        <input type="checkbox" id="floating-icon-toggle">
        <span class="slider"></span>
      </label>
      <span>Show Floating Icon</span>
    </div>
    <div class="shortcut-row">
      <div class="shortcut-section">
          <span>Toggle assistant shortcut:</span>
        <div class="shortcut-wrapper">
          <span class="shortcut-display" id="current-shortcut">Loading...</span>
          <button class="edit-shortcut" id="edit-shortcut" title="Edit Shortcut">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div class="api-row">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:14px;font-weight:600;">NanoGPT API key</span>
        <a href="https://nano-gpt.com/api" target="_blank" rel="noreferrer" style="font-size:12px;">Get a key</a>
      </div>
      <div class="api-controls">
        <div class="api-input-wrap">
          <input id="api-key" class="api-input" type="password" placeholder="Enter your API key" autocomplete="off">
          <button id="toggle-key" class="api-eye" title="Show/Hide" aria-label="Show/Hide">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button id="save-key" class="btn primary">Save</button>
      </div>
      <div class="api-help">Stored locally in the extension. Never shared with sites.</div>
    </div>
  </div>
  <div class="blacklist-row">
    <div class="blacklist-header">
      <span class="blacklist-title">Extension disabled on</span>
      <button class="blacklist-add" id="add-site">Add Site</button>
    </div>
    <div class="blacklist-items" id="blacklist-items">
      <!-- Items will be added here dynamically -->
      <div class="blacklist-empty">No sites added</div>
    </div>
  </div>
  <script src="popup.js"></script>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
