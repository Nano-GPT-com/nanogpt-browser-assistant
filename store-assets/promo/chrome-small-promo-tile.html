<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NanoGPT Browser Assistant small promo tile</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 440px;
        height: 280px;
        overflow: hidden;
        background:
          radial-gradient(circle at 84% 16%, rgba(45, 212, 191, 0.28), transparent 35%),
          radial-gradient(circle at 18% 18%, rgba(74, 168, 255, 0.30), transparent 36%),
          linear-gradient(135deg, #08111f 0%, #0d1726 58%, #111827 100%);
        color: #f4f8ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .tile {
        position: relative;
        width: 440px;
        height: 280px;
        padding: 30px;
      }

      .grid {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(115, 190, 255, 0.08) 1px, transparent 1px),
          linear-gradient(rgba(115, 190, 255, 0.07) 1px, transparent 1px);
        background-size: 34px 34px;
        opacity: 0.8;
      }

      .brand {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        box-shadow: 0 12px 28px rgba(37, 177, 255, 0.30);
      }

      .name {
        font-size: 23px;
        font-weight: 850;
        letter-spacing: 0;
      }

      h1 {
        position: relative;
        max-width: 330px;
        margin: 34px 0 0;
        font-size: 39px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .chip {
        position: absolute;
        left: 30px;
        bottom: 28px;
        display: inline-flex;
        align-items: center;
        height: 34px;
        padding: 0 13px;
        border: 1px solid rgba(81, 178, 255, 0.46);
        border-radius: 999px;
        background: rgba(74, 168, 255, 0.15);
        color: #b9e4ff;
        font-size: 15px;
        font-weight: 800;
      }

      .panel {
        position: absolute;
        right: 24px;
        bottom: 24px;
        width: 116px;
        height: 148px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      }

      .panel::before,
      .panel::after {
        content: "";
        position: absolute;
        left: 15px;
        right: 15px;
        height: 14px;
        border-radius: 999px;
        background: #243447;
      }

      .panel::before { top: 22px; }
      .panel::after { top: 48px; width: 58px; }

      .send {
        position: absolute;
        right: 14px;
        bottom: 14px;
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 10px;
        background: #4aa8ff;
        font-size: 25px;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main class="tile">
      <div class="grid"></div>
      <div class="brand">
        <img class="logo" src="../../Chrome%20extension/logo.png" alt="">
        <div class="name">NanoGPT</div>
      </div>
      <h1>AI for every webpage</h1>
      <div class="chip">Browser Assistant</div>
      <div class="panel"><div class="send">›</div></div>
    </main>
  </body>
</html>
